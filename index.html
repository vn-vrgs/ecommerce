<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-commerce</title>
    <link rel="stylesheet" href="./assets/css/style.css" />
</head>

<body>
    <div class="container">
        <!-- Navbar -->
        <nav class="navbar">
            <h1>Mi E-commerce</h1>
        </nav>
        <!-- Sidebar -->
        <aside class="sidebar">
            <h2>Categorías</h2>
            <div class="categoria">
                <span>Perfumes</span>
                <span>(13)</span>
            </div>
            <div class="categoria">
                <span>Ropa</span>
                <span>(21)</span>
            </div>
            <div class="categoria">
                <span>Accesorios</span>
                <span>(41)</span>
            </div>
            <div class="categoria">
                <span>Zapatos</span>
                <span>(10)</span>
            </div>
        </aside>

        <!-- Productos -->
        <main class="productos">
            <div class="card">
                <img src="./assets/img/perfume1.jpg" alt="Producto">
                <h3>Perfume 1</h3>
                <p>$25.990</p>
                <button>Comprar</button>
            </div>
            <div class="card">
                <img src="./assets/img/perfume2.jpg" alt="Producto">
                <h3>Perfume 2</h3>
                <p>$18.990</p>
                <button>Comprar</button>
            </div>
            <div class="card">
                <img src="./assets/img/perfume3.jpg" alt="Producto">
                <h3>Perfume 3</h3>
                <p>$39.990</p>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="./assets/img/reloj1.jpg" alt="Producto">
                <h3>Reloj 1</h3>
                <p>$12.990</p>
                <button>Comprar</button>
            </div>
            <div class="card">
                <img src="./assets/img/reloj2.jpg" alt="Producto">
                <h3>Reloj 2</h3>
                <p>$44.990</p>
                <button>Comprar</button>
            </div>
            <div class="card">
                <img src="./assets/img/reloj3.jpg" alt="Producto">
                <h3>Reloj 3</h3>
                <p>$29.990</p>
                <button>Comprar</button>
            </div>

            <div class="card">
                <img src="./assets/img/abrigo1.jpg" alt="Producto">
                <h3>Abrigo 1</h3>
                <p>$62.990</p>
                <button>Comprar</button>
            </div>
            <div class="card">
                <img src="./assets/img/abrigo2.jpg" alt="Producto">
                <h3>Abrigo 2</h3>
                <p>$21.990</p>
                <button>Comprar</button>
            </div>
            <div class="card">
                <img src="./assets/img/abrigo3.jpg" alt="Producto">
                <h3>Abrigo 3</h3>
                <p>$10.990</p>
                <button>Comprar</button>
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Mi E-commerce © 2026</p>
        </footer>
    </div>
</body>
</html>
